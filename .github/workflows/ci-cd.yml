name: CI CD Build Push Deploy

on:
  push:
    branches:
      - main
      - develop

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/s-samusik/my-pets-blazor

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release

      - name: Run unit tests
        run: dotnet test ./PT.Application.Tests -c Release --verbosity normal

  build-and-push:
    runs-on: ubuntu-latest
    needs: build-and-test
    outputs:
      tag: ${{ steps.set-tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: set-tag
        run: |
          SHORT_SHA=${GITHUB_SHA::8}
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            echo "tag=prod-${SHORT_SHA}" >> $GITHUB_OUTPUT
          else
            echo "tag=dev-${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.IMAGE }}:${{ steps.set-tag.outputs.tag }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: >
      github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - name: Prepare variables
        id: vars
        run: |
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            echo "ENV=prod" >> $GITHUB_OUTPUT
            echo "TAG=${{ needs.build-and-push.outputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "ENV=dev" >> $GITHUB_OUTPUT
            echo "TAG=${{ needs.build-and-push.outputs.tag }}" >> $GITHUB_OUTPUT
          fi

      - name: Create env file
        id: create_env
        run: |
          if [ "${{ steps.vars.outputs.ENV }}" = "prod" ]; then
            ENVFILE="my-pets.prod.env"
            echo "ASPNETCORE_ENVIRONMENT=Production" > $ENVFILE
            echo "ConnectionStrings__PostgreDB=${{ secrets.POSTGRES_CONNECTION_PROD }}" >> $ENVFILE
            echo "AWS__AccessKey=${{ secrets.AWS_ACCESS_KEY_ID_PROD }}" >> $ENVFILE
            echo "AWS__SecretKey=${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}" >> $ENVFILE
            echo "AWS__Bucket=${{ secrets.AWS_BUCKET_PROD }}" >> $ENVFILE
            echo "AWS__Endpoint=${{ secrets.AWS_ENDPOINT_PROD }}" >> $ENVFILE
            echo "AWS__PublicEndpoint=${{ secrets.AWS_PUBLIC_ENDPOINT_PROD }}" >> $ENVFILE
          else
            ENVFILE="my-pets.dev.env"
            echo "ASPNETCORE_ENVIRONMENT=Development" > $ENVFILE
            echo "ConnectionStrings__PostgreDB=${{ secrets.POSTGRES_CONNECTION_DEV }}" >> $ENVFILE
            echo "AWS__AccessKey=${{ secrets.AWS_ACCESS_KEY_ID_DEV }}" >> $ENVFILE
            echo "AWS__SecretKey=${{ secrets.AWS_SECRET_ACCESS_KEY_DEV }}" >> $ENVFILE
            echo "AWS__Bucket=${{ secrets.AWS_BUCKET_DEV }}" >> $ENVFILE
            echo "AWS__Endpoint=${{ secrets.AWS_ENDPOINT_DEV }}" >> $ENVFILE
            echo "AWS__PublicEndpoint=${{ secrets.AWS_PUBLIC_ENDPOINT_DEV }}" >> $ENVFILE
          fi
          echo "FILE_NAME=$ENVFILE" >> $GITHUB_OUTPUT

      - name: Copy env file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          source: "${{ steps.create_env.outputs.FILE_NAME }}"
          target: "/home/${{ secrets.DEPLOY_SSH_USER }}/apps/my-pets/envs/"

      - name: Deploy on server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          script: |
            set -e
            cd /home/${{ secrets.DEPLOY_SSH_USER }}/apps/my-pets
            TAG=${{ needs.build-and-push.outputs.tag }}
            IMAGE=${{ env.IMAGE }}
            docker pull $IMAGE:$TAG
            sed -i "s|ghcr.io/s-samusik/my-pets-blazor:.*|ghcr.io/s-samusik/my-pets-blazor:$TAG|g" docker-compose.yml || true
            docker compose up -d --no-deps --build
            docker image prune -f
